<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <!-- Definitions -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="lightPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="lightBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/>
      <stop offset="100%" style="stop-color:#d0dbe7"/>
    </linearGradient>
    <linearGradient id="lightGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dcfce7"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrowheadBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4f46e5"/>
    </marker>
    <marker id="arrowheadGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="700" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#4f46e5" text-anchor="middle">ChalkAI - Architecture Diagram</text>
  
  <!-- USER LAYER: y=40, height=160 -->
  <rect x="50" y="40" width="800" height="160" rx="12" fill="url(#lightPurpleGrad)" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7c3aed" text-anchor="middle">USER LAYER</text>
  
  <!-- Browser Box (left half) -->
  <rect x="80" y="90" width="350" height="95" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="255" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5" text-anchor="middle">Browser</text>
  <text x="255" y="142" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">Voice Input (Web Speech API)</text>
  <text x="255" y="160" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle">React Frontend + Text-to-Speech</text>
  
  <!-- Hosted On Box (right half) -->
  <rect x="470" y="90" width="360" height="95" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="650" y="118" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5" text-anchor="middle">Hosted On</text>
  <text x="650" y="142" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Netlify</text>
  <text x="650" y="162" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">chalkai-app.netlify.app</text>
  
  <!-- Arrow 1: User types/speaks → Frontend (left side) -->
  <line x1="200" y1="200" x2="200" y2="280" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="130" y="245" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle">User types/speaks</text>
  
  <!-- Arrow 2: Frontend → FastAPI (right side) -->
  <line x1="700" y1="200" x2="700" y2="280" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowheadBlue)"/>
  <text x="760" y="245" font-family="Arial, sans-serif" font-size="12" fill="#4f46e5" text-anchor="middle">HTTP/streaming</text>
  
  <!-- BACKEND LAYER: y=280, height=160 -->
  <rect x="50" y="280" width="800" height="160" rx="12" fill="url(#lightBlueGrad)" stroke="#4f46e5" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="310" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4f46e5" text-anchor="middle">BACKEND LAYER</text>
  
  <!-- FastAPI Box -->
  <rect x="80" y="330" width="740" height="95" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="450" y="358" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4f46e5" text-anchor="middle">FastAPI Backend</text>
  <rect x="100" y="375" width="200" height="35" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="200" y="398" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle">/explain-stream</text>
  <rect x="320" y="375" width="200" height="35" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="420" y="398" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle">/generate-images</text>
  <rect x="540" y="375" width="200" height="35" rx="6" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="640" y="398" font-family="Arial, sans-serif" font-size="12" fill="#7c3aed" text-anchor="middle">/generate-quiz</text>
  
  <!-- Google Cloud Run label below FastAPI box -->
  <text x="450" y="435" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Hosted on: Google Cloud Run</text>
  
  <!-- Arrow 3: FastAPI → Gemini (left side) -->
  <line x1="420" y1="440" x2="420" y2="520" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowheadGreen)"/>
  <text x="330" y="485" font-family="Arial, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">API calls</text>
  
  <!-- Arrow 4: Gemini → FastAPI (right side) -->
  <line x1="480" y1="520" x2="480" y2="440" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowheadGreen)"/>
  <text x="550" y="485" font-family="Arial, sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">response</text>
  
  <!-- AI LAYER: y=520, height=140 -->
  <rect x="50" y="520" width="800" height="140" rx="12" fill="url(#lightGreenGrad)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="555" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#16a34a" text-anchor="middle">AI LAYER</text>
  
  <!-- Gemini Box -->
  <rect x="150" y="575" width="600" height="70" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="450" y="605" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#16a34a" text-anchor="middle">Google Gemini 2.5 Flash</text>
  <text x="450" y="628" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Text Generation | SVG Diagram Generation | Quiz Generation</text>
  
  <!-- Flow indicator at bottom -->
  <rect x="50" y="670" width="800" height="25" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="687" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">React → User: text + SVG diagrams + audio + quiz</text>
</svg>